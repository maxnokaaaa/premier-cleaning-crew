<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0b1220" />
<title>Crew Clock</title>
<style>
  :root {
    --bg: #0b1220; --card: #131c2e; --card2: #1b2740;
    --text: #eaf0fb; --muted: #93a2bf; --line: #26324b;
    --blue: #2f6bff; --green: #16c07a; --amber: #f4a723; --red: #f0524f;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100dvh; padding: env(safe-area-inset-top) 16px calc(env(safe-area-inset-bottom) + 16px);
  }
  .wrap { max-width: 480px; margin: 0 auto; }
  header { text-align: center; padding: 22px 0 8px; }
  header h1 { font-size: 20px; margin: 0; letter-spacing: .3px; }
  header p { color: var(--muted); margin: 4px 0 0; font-size: 13px; }

  .btn {
    display: block; width: 100%; border: 0; border-radius: 16px;
    padding: 20px; font-size: 20px; font-weight: 700; color: #fff;
    margin: 12px 0; cursor: pointer; transition: transform .05s ease, filter .15s;
  }
  .btn:active { transform: scale(.98); }
  .btn.blue { background: var(--blue); }
  .btn.green { background: var(--green); }
  .btn.amber { background: var(--amber); color: #201400; }
  .btn.red { background: var(--red); }
  .btn.ghost { background: var(--card2); color: var(--text); font-size: 16px; font-weight: 600; }

  .name-btn {
    display: flex; align-items: center; gap: 14px; width: 100%;
    background: var(--card); border: 1px solid var(--line); color: var(--text);
    border-radius: 16px; padding: 18px; font-size: 19px; font-weight: 600;
    margin: 10px 0; cursor: pointer; text-align: left;
  }
  .name-btn:active { background: var(--card2); }
  .avatar {
    width: 42px; height: 42px; border-radius: 50%; flex: 0 0 auto;
    display: grid; place-items: center; font-weight: 700; color: #fff; font-size: 17px;
    background: var(--blue);
  }

  .status-card {
    background: var(--card); border: 1px solid var(--line); border-radius: 20px;
    padding: 24px 20px; text-align: center; margin-top: 12px;
  }
  .dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-right: 8px; vertical-align: middle; }
  .status-label { font-size: 15px; color: var(--muted); }
  .status-big { font-size: 26px; font-weight: 800; margin-top: 4px; }
  .countdown {
    font-size: 56px; font-weight: 800; margin: 10px 0 2px; font-variant-numeric: tabular-nums;
    letter-spacing: 1px;
  }
  .countdown.warn { color: var(--amber); }
  .countdown.over { color: var(--red); }
  .sub { color: var(--muted); font-size: 14px; }

  .stats { display: flex; gap: 10px; margin-top: 16px; }
  .stat { flex: 1; background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 14px 8px; text-align: center; }
  .stat b { display: block; font-size: 22px; }
  .stat span { color: var(--muted); font-size: 12px; }
  .stat.bad b { color: var(--red); }

  .back { background: none; border: 0; color: var(--muted); font-size: 15px; padding: 10px 0; cursor: pointer; }
  .hidden { display: none; }
  .warnbox { background: rgba(240,82,79,.12); border: 1px solid rgba(240,82,79,.4); color: #ffb4b2; border-radius: 12px; padding: 12px; font-size: 14px; margin-top: 12px; }
  .foot { text-align: center; color: var(--muted); font-size: 12px; margin-top: 26px; }
  a.adminlink { color: var(--muted); }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>🧽 Crew Clock</h1>
    <p id="tagline">Tap your name to start</p>
  </header>

  <!-- Screen 1: pick your name -->
  <div id="pick">
    <div id="workerList"></div>
  </div>

  <!-- Screen 2: your day -->
  <div id="me" class="hidden">
    <button class="back" onclick="goBack()">‹ Not you? Switch worker</button>

    <div class="status-card">
      <div class="status-label"><span class="dot" id="dot"></span><span id="stateLabel">—</span></div>
      <div class="status-big" id="stateBig">—</div>
      <div id="timerBox" class="hidden">
        <div class="countdown" id="countdown">30:00</div>
        <div class="sub">to reach & start your next job</div>
      </div>
      <div id="lateBox" class="warnbox hidden">
        ⚠️ You went over the travel window. A 1-hour penalty has been logged. Start your next job now.
      </div>
    </div>

    <div id="actions"></div>

    <div class="stats">
      <div class="stat"><b id="sJobs">0</b><span>jobs today</span></div>
      <div class="stat"><b id="sHours">0h</b><span>worked</span></div>
      <div class="stat" id="sPenWrap"><b id="sPen">0</b><span>penalties</span></div>
    </div>
  </div>

  <div class="foot">
    <a class="adminlink" href="/admin">Owner dashboard →</a>
  </div>
</div>

<script>
const $ = (id) => document.getElementById(id);
let me = null;         // {id, name}
let poll = null;       // polling interval
let tick = null;       // 1s countdown interval
let deadline = null;   // ms
let skew = 0;          // serverNow - clientNow

function initials(name){ return name.split(/\s+/).map(w=>w[0]).slice(0,2).join('').toUpperCase(); }

async function loadWorkers(){
  const list = await fetch('/api/workers').then(r=>r.json());
  const box = $('workerList');
  if(!list.length){ box.innerHTML = '<p style="text-align:center;color:var(--muted)">No workers yet. The owner adds them in the dashboard.</p>'; return; }
  box.innerHTML = '';
  for(const w of list){
    const b = document.createElement('button');
    b.className = 'name-btn';
    b.innerHTML = `<span class="avatar">${initials(w.name)}</span><span>${w.name}</span>`;
    b.onclick = () => selectWorker(w);
    box.appendChild(b);
  }
}

function selectWorker(w){
  me = w;
  localStorage.setItem('crew_worker', JSON.stringify(w));
  $('pick').classList.add('hidden');
  $('tagline').textContent = w.name;
  $('me').classList.remove('hidden');
  refresh();
  clearInterval(poll); poll = setInterval(refresh, 15000);
}

function goBack(){
  localStorage.removeItem('crew_worker');
  me = null; clearInterval(poll); clearInterval(tick);
  $('me').classList.add('hidden');
  $('pick').classList.remove('hidden');
  $('tagline').textContent = 'Tap your name to start';
  loadWorkers();
}

async function act(path, body){
  await fetch(path, {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body||{})});
  await refresh();
}

const STATES = {
  off:       {label:'Not working',  big:'Clocked out',  color:'#93a2bf'},
  idle:      {label:'On shift',     big:'Ready — start a job', color:'#2f6bff'},
  working:   {label:'On the job',   big:'Working',      color:'#16c07a'},
  traveling: {label:'Travelling',   big:'Head to next job', color:'#f4a723'},
  late:      {label:'Overdue',      big:'You are late', color:'#f0524f'},
};

async function refresh(){
  if(!me) return;
  const d = await fetch('/api/me/'+me.id).then(r=>r.json());
  skew = d.serverNow - Date.now();
  const s = STATES[d.state] || STATES.off;
  $('dot').style.background = s.color;
  $('stateLabel').textContent = s.label;
  $('stateBig').textContent = s.big;

  // countdown
  deadline = d.deadline;
  $('timerBox').classList.toggle('hidden', d.state !== 'traveling');
  $('lateBox').classList.toggle('hidden', d.state !== 'late');
  clearInterval(tick);
  if(d.state === 'traveling'){ renderCountdown(); tick = setInterval(renderCountdown, 1000); }

  // stats
  $('sJobs').textContent = d.summary.jobsDone;
  $('sHours').textContent = (d.summary.workedMinutes/60).toFixed(1).replace('.0','')+'h';
  $('sPen').textContent = d.summary.penalties;
  $('sPenWrap').classList.toggle('bad', d.summary.penalties>0);

  // actions
  renderActions(d.state);
}

function renderCountdown(){
  if(deadline == null) return;
  const now = Date.now() + skew;
  let left = Math.round((deadline - now)/1000);
  const el = $('countdown');
  el.classList.remove('warn','over');
  if(left <= 0){ el.textContent='00:00'; el.classList.add('over'); refresh(); return; }
  if(left <= 300) el.classList.add('warn');
  const m = Math.floor(left/60), sec = left%60;
  el.textContent = `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

function renderActions(state){
  const box = $('actions'); box.innerHTML='';
  const add = (label, cls, fn) => { const b=document.createElement('button'); b.className='btn '+cls; b.textContent=label; b.onclick=fn; box.appendChild(b); };
  if(state==='off'){ add('🟢  Clock In', 'blue', ()=>act('/api/clock-in',{workerId:me.id})); return; }
  if(state==='idle'){ add('▶️  Start Job', 'green', ()=>act('/api/start-job',{workerId:me.id})); }
  if(state==='working'){ add('✅  Finished — Mark Done', 'amber', ()=>act('/api/finish-job',{workerId:me.id})); }
  if(state==='traveling' || state==='late'){ add('📍  Arrived — Start Next Job', 'green', ()=>act('/api/start-job',{workerId:me.id})); }
  // clock out is always available while on shift
  add('⏹  Clock Out (end of day)', 'ghost', ()=>{ if(confirm('Clock out for the day?')) act('/api/clock-out',{workerId:me.id}); });
}

// restore last worker on this phone
loadWorkers().then(()=>{
  const saved = localStorage.getItem('crew_worker');
  if(saved){ try{ selectWorker(JSON.parse(saved)); }catch(e){} }
});
</script>
</body>
</html>
