<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0b1220" />
<title>Premier Cleaning — Owner Dashboard</title>
<style>
  :root{
    --bg:#0b1220; --card:#131c2e; --card2:#1b2740; --text:#eaf0fb; --muted:#93a2bf;
    --line:#26324b; --brand:#1f7a4d; --blue:#2f6bff; --green:#16c07a; --amber:#f4a723; --red:#f0524f;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--bg); color:var(--text); min-height:100dvh;
    padding: env(safe-area-inset-top) 14px calc(env(safe-area-inset-bottom) + 26px);}
  .wrap{max-width:820px; margin:0 auto;}
  header{display:flex; align-items:center; justify-content:space-between; padding:16px 0 8px;}
  .brandrow{display:flex; align-items:center; gap:10px;}
  .logo{width:34px;height:34px;border-radius:9px;background:var(--brand);display:grid;place-items:center;font-size:18px;}
  header h1{font-size:18px; margin:0;}
  .muted{color:var(--muted);}
  .tabs{display:flex; gap:8px; margin:8px 0 16px; overflow-x:auto; padding-bottom:4px;}
  .tab{background:var(--card); border:1px solid var(--line); color:var(--muted); border-radius:999px; padding:9px 15px; font-size:14px; white-space:nowrap; cursor:pointer;}
  .tab.on{background:var(--brand); color:#fff; border-color:var(--brand);}
  .card{background:var(--card); border:1px solid var(--line); border-radius:16px; padding:16px; margin-bottom:12px;}
  .row{display:flex; align-items:center; justify-content:space-between; gap:12px;}
  .dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:8px;}
  .pill{font-size:12px; padding:3px 10px; border-radius:999px; font-weight:600;}
  .name{font-weight:700; font-size:17px;} .sub{color:var(--muted); font-size:13px; margin-top:3px;}
  .cd{font-variant-numeric:tabular-nums; font-weight:800; font-size:20px;} .cd.warn{color:var(--amber);} .cd.over{color:var(--red);}
  .btn{border:0; border-radius:10px; padding:9px 14px; font-weight:600; font-size:14px; cursor:pointer; color:#fff;}
  .btn.brand{background:var(--brand);} .btn.blue{background:var(--blue);} .btn.ghost{background:var(--card2); color:var(--text);} .btn.red{background:var(--red);}
  .btn.small{padding:6px 12px; font-size:13px;} .btn:disabled{opacity:.5;}
  input,select,textarea{background:var(--card2); border:1px solid var(--line); color:var(--text); border-radius:10px; padding:11px 12px; font-size:15px; width:100%; font-family:inherit;}
  textarea{min-height:74px; resize:vertical;}
  label{font-size:13px; color:var(--muted); display:block; margin:10px 0 5px;}
  .grid2{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  table{width:100%; border-collapse:collapse; font-size:14px;} td,th{text-align:left; padding:9px 6px; border-bottom:1px solid var(--line);} th{color:var(--muted); font-weight:600; font-size:12px;}
  .strike{text-decoration:line-through; color:var(--muted);}
  .login{max-width:340px; margin:14vh auto 0; text-align:center;}
  .hidden{display:none;}
  .kpi{display:flex; gap:10px; margin-bottom:14px;} .kpi .card{flex:1; text-align:center; padding:14px 8px; margin:0;} .kpi b{font-size:22px; display:block;} .kpi span{font-size:12px; color:var(--muted);}
  h3{font-size:15px; margin:2px 0 12px;}
  .badge{font-size:11px; font-weight:700; padding:3px 9px; border-radius:999px;}
  .b-assigned{background:var(--card2); color:var(--muted);} .b-progress{background:rgba(47,107,255,.2); color:#9dbcff;} .b-done{background:rgba(22,192,122,.2); color:#7fe6b8;}
  .thumbs{display:flex; gap:8px; flex-wrap:wrap; margin-top:8px;} .thumbs a img{width:70px;height:70px;object-fit:cover;border-radius:10px;border:1px solid var(--line);}
  .maplink{color:var(--blue); font-size:13px; text-decoration:none;}
  .check-mini{font-size:13px; color:var(--muted); margin-top:6px;} .check-mini .ok{color:var(--green);}
</style>
</head>
<body>
<div class="wrap">
  <div id="login" class="login">
    <div class="logo" style="margin:0 auto 10px;width:52px;height:52px;font-size:26px;border-radius:14px">🧽</div>
    <h1>Owner Dashboard</h1>
    <p class="muted">Enter your PIN</p>
    <input id="pin" type="password" inputmode="numeric" placeholder="PIN" style="text-align:center; font-size:22px; letter-spacing:4px;" />
    <button class="btn brand" style="width:100%; margin-top:12px; padding:13px;" onclick="login()">Enter</button>
    <p id="loginErr" class="muted" style="color:var(--red);"></p>
  </div>

  <div id="app" class="hidden">
    <header>
      <div class="brandrow"><div class="logo">🧽</div><h1 id="bizName">Premier Cleaning</h1></div>
      <button class="btn ghost small" onclick="logout()">Lock</button>
    </header>
    <div class="tabs">
      <div class="tab on" data-tab="live" onclick="showTab('live')">Live crew</div>
      <div class="tab" data-tab="schedule" onclick="showTab('schedule')">Schedule</div>
      <div class="tab" data-tab="payroll" onclick="showTab('payroll')">Payroll</div>
      <div class="tab" data-tab="messages" onclick="showTab('messages')">Messages</div>
      <div class="tab" data-tab="penalties" onclick="showTab('penalties')">Penalties</div>
      <div class="tab" data-tab="log" onclick="showTab('log')">Log</div>
      <div class="tab" data-tab="workers" onclick="showTab('workers')">Workers</div>
      <div class="tab" data-tab="settings" onclick="showTab('settings')">Settings</div>
    </div>
    <div id="tab-live"></div>
    <div id="tab-schedule" class="hidden"></div>
    <div id="tab-payroll" class="hidden"></div>
    <div id="tab-messages" class="hidden"></div>
    <div id="tab-penalties" class="hidden"></div>
    <div id="tab-log" class="hidden"></div>
    <div id="tab-workers" class="hidden"></div>
    <div id="tab-settings" class="hidden"></div>
  </div>
</div>

<script>
const $=(id)=>document.getElementById(id);
let PIN=localStorage.getItem('crew_pin')||'';
let skew=0, tickTimer=null, pollTimer=null, cur='live', settingsCache={};
let schedDate=todayStr(), payWeek=null;
function hdr(){ return {'Content-Type':'application/json','x-admin-pin':PIN}; }
const initials=(n)=>n.split(/\s+/).map(w=>w[0]).slice(0,2).join('').toUpperCase();
function todayStr(){ const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
const fmtTime=(t)=>new Date(t).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
const fmtDate=(t)=>new Date(t).toLocaleDateString([], {day:'numeric',month:'short'});
function escapeHtml(s){ return (s||'').replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

async function login(){
  const pin=$('pin').value.trim();
  const ok=await fetch('/api/admin/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pin})}).then(r=>r.json());
  if(ok.ok){ PIN=pin; localStorage.setItem('crew_pin',pin); enter(); } else $('loginErr').textContent='Wrong PIN, try again.';
}
function logout(){ localStorage.removeItem('crew_pin'); PIN=''; clearInterval(pollTimer); clearInterval(tickTimer); $('app').classList.add('hidden'); $('login').classList.remove('hidden'); }
function enter(){ $('login').classList.add('hidden'); $('app').classList.remove('hidden'); showTab('live'); clearInterval(pollTimer); pollTimer=setInterval(()=>{ if(cur==='live') loadLive(); }, 12000); }

function showTab(t){
  cur=t;
  document.querySelectorAll('.tab').forEach(el=>el.classList.toggle('on', el.dataset.tab===t));
  ['live','schedule','payroll','messages','penalties','log','workers','settings'].forEach(x=>$('tab-'+x).classList.toggle('hidden', x!==t));
  ({live:loadLive, schedule:loadSchedule, payroll:loadPayroll, messages:loadMessages, penalties:loadPenalties, log:loadLog, workers:loadWorkers, settings:loadSettings})[t]();
}

const SM={ off:{txt:'Clocked out',c:'#93a2bf'}, idle:{txt:'On shift (idle)',c:'#2f6bff'}, working:{txt:'Working',c:'#16c07a'}, traveling:{txt:'Travelling',c:'#f4a723'}, late:{txt:'OVERDUE',c:'#f0524f'} };

async function loadLive(){
  const d=await fetch('/api/admin/overview',{headers:hdr()}).then(r=>r.json());
  if(d.error) return logout();
  skew=d.serverNow-Date.now(); settingsCache=d.settings;
  if(d.settings.businessName){ $('bizName').textContent=d.settings.businessName; document.title=d.settings.businessName+' — Owner'; }
  if(d.settings.brandColor) document.documentElement.style.setProperty('--brand', d.settings.brandColor);
  const onNow=d.crew.filter(c=>c.state!=='off').length, late=d.crew.filter(c=>c.state==='late').length, pen=d.crew.reduce((s,c)=>s+c.summary.penalties,0);
  let html=`<div class="kpi">
    <div class="card"><b>${onNow}</b><span>on shift now</span></div>
    <div class="card"><b style="color:${late?'var(--red)':'inherit'}">${late}</b><span>overdue</span></div>
    <div class="card"><b style="color:${pen?'var(--red)':'inherit'}">${pen}</b><span>penalties today</span></div></div>`;
  if(!d.crew.length) html+=`<div class="card muted">No workers yet — add them in <b>Workers</b>.</div>`;
  for(const c of d.crew){
    const m=SM[c.state];
    const cd=c.state==='traveling'?`<span class="cd" data-deadline="${c.deadline}">--:--</span>`:'';
    const penB=c.summary.penalties>0?`<span class="pill" style="background:rgba(240,82,79,.15);color:#ff9d9b">${c.summary.penalties} pen</span>`:'';
    const loc=c.location?`<a class="maplink" href="https://maps.google.com/?q=${c.location.lat},${c.location.lng}" target="_blank">📍 Last seen ${fmtTime(c.location.at)} — view on map</a>`:'<span class="sub">📍 no GPS yet</span>';
    html+=`<div class="card"><div class="row">
      <div class="row" style="gap:10px;">
        <span style="width:38px;height:38px;border-radius:50%;background:${m.c};display:grid;place-items:center;font-weight:700;color:#0b1220">${initials(c.name)}</span>
        <div><div class="name">${escapeHtml(c.name)}${c.place?` <span class="pill" style="background:rgba(31,122,77,.2);color:#7fe6b8">📍 ${escapeHtml(c.place)}</span>`:''}</div>
        <div class="sub"><span class="dot" style="background:${m.c}"></span>${m.txt} · ${c.jobsDoneScheduled}/${c.jobsScheduled} jobs · ${(c.summary.workedMinutes/60).toFixed(1).replace('.0','')}h</div></div>
      </div>
      <div style="text-align:right">${cd}<div>${penB}</div></div></div>
      <div style="margin-top:8px">${loc}</div></div>`;
  }
  $('tab-live').innerHTML=html; startTicks();
}
function startTicks(){
  clearInterval(tickTimer);
  tickTimer=setInterval(()=>{ document.querySelectorAll('.cd[data-deadline]').forEach(el=>{
    let left=Math.round((Number(el.dataset.deadline)-(Date.now()+skew))/1000); el.classList.remove('warn','over');
    if(left<=0){ el.textContent='00:00'; el.classList.add('over'); return; } if(left<=300) el.classList.add('warn');
    el.textContent=`${String(Math.floor(left/60)).padStart(2,'0')}:${String(left%60).padStart(2,'0')}`; }); },1000);
}

// ---------- Schedule ----------
async function loadSchedule(){
  const [workers, items, calJobs] = await Promise.all([
    fetch('/api/workers').then(r=>r.json()),
    fetch('/api/admin/assignments?date='+schedDate,{headers:hdr()}).then(r=>r.json()),
    fetch('/api/admin/calendar?date='+schedDate,{headers:hdr()}).then(r=>r.json()).catch(()=>[]),
  ]);
  let html=`<div class="row" style="margin:2px 4px 10px"><h3 style="margin:0">📅 Jobs from your Premier calendar</h3>
    <input type="date" style="width:auto" value="${schedDate}" onchange="schedDate=this.value; loadSchedule()"></div>`;
  if(!calJobs.length) html+=`<div class="card muted">No calendar jobs for this day. If that's unexpected, add your calendar link in <b>Settings</b>.</div>`;
  for(const j of calJobs){
    const who=(j.workers&&j.workers.length)?j.workers.map(w=>`${escapeHtml(w.name)} <span class="badge ${w.status==='done'?'b-done':'b-progress'}">${w.status==='done'?'done ✓':'on it'}</span>`).join(' &nbsp; '):'<span class="muted">not started yet</span>';
    html+=`<div class="card"><div class="name">${escapeHtml(j.client)}${j.start?' &nbsp;<span class="sub">'+fmtTime(j.start)+'</span>':''}</div>`;
    if(j.title && j.title.toLowerCase()!==j.client.toLowerCase()) html+=`<div class="sub">${escapeHtml(j.title)}</div>`;
    if(j.address) html+=`<div style="margin-top:5px"><a class="maplink" href="https://maps.google.com/?q=${encodeURIComponent(j.address)}" target="_blank">📍 ${escapeHtml(j.address)}</a></div>`;
    html+=`<div class="sub" style="margin-top:7px">👤 ${who}</div>`;
    if(j.details) html+=`<details style="margin-top:7px"><summary style="color:var(--blue);cursor:pointer">Job details</summary><div style="white-space:pre-wrap;margin-top:6px;font-size:13px;line-height:1.5">${escapeHtml(j.details)}</div></details>`;
    html+=`</div>`;
  }

  html+=`<div class="card" style="margin-top:16px"><h3>➕ Assign an extra (non-calendar) job</h3>
    <div class="grid2">
      <div><label>Worker</label><select id="asgWorker">${workers.map(w=>`<option value="${w.id}">${escapeHtml(w.name)}</option>`).join('')}</select></div>
      <div><label>Date</label><input id="asgDate" type="date" value="${schedDate}"></div>
    </div>
    <label>Job title</label><input id="asgTitle" placeholder="e.g. Oak Street flat — full clean">
    <div class="grid2">
      <div><label>Address</label><input id="asgAddr" placeholder="12 Oak Street, Sliema"></div>
      <div><label>Start time (optional)</label><input id="asgTime" type="time"></div>
    </div>
    <label>Notes for the cleaner (optional)</label><input id="asgNotes" placeholder="Key under the mat, dog friendly">
    <label>Checklist — one item per line (optional)</label>
    <textarea id="asgCheck" placeholder="Kitchen surfaces&#10;Bathroom &amp; toilet&#10;Vacuum all floors&#10;Empty bins"></textarea>
    <button class="btn brand" style="margin-top:12px" onclick="addAssignment()">Add job to schedule</button>
  </div>`;

  if(items.length) html+=`<div class="section-title" style="font-size:13px;color:var(--muted);margin:16px 4px 8px">Extra jobs for this day</div>`;
  for(const a of items){
    const badge=a.status==='done'?'<span class="badge b-done">Done ✓</span>':a.status==='in_progress'?'<span class="badge b-progress">In progress</span>':'<span class="badge b-assigned">To do</span>';
    const done=a.checklist.filter(c=>c.done).length;
    html+=`<div class="card"><div class="row"><div class="name">${escapeHtml(a.title)} ${badge}</div>
      <button class="btn red small" onclick="removeAssignment(${a.id})">Delete</button></div>
      <div class="sub">👤 ${escapeHtml(a.workerName)}${a.scheduledAt?' · 🕒 '+fmtTime(a.scheduledAt):''}</div>`;
    if(a.address) html+=`<div style="margin-top:6px"><a class="maplink" href="https://maps.google.com/?q=${encodeURIComponent(a.address)}" target="_blank">📍 ${escapeHtml(a.address)}</a></div>`;
    if(a.notes) html+=`<div class="sub" style="margin-top:6px">📝 ${escapeHtml(a.notes)}</div>`;
    if(a.checklist.length){ html+=`<div class="check-mini">☑️ Checklist ${done}/${a.checklist.length}: `+a.checklist.map(c=>`<span class="${c.done?'ok':''}">${c.done?'✓':'○'} ${escapeHtml(c.text)}</span>`).join(' · ')+`</div>`; }
    if(a.photos.length){ html+=`<div class="thumbs">`+a.photos.map(p=>`<a href="${p.url}" target="_blank"><img src="${p.url}"></a>`).join('')+`</div>`; }
    html+=`</div>`;
  }
  $('tab-schedule').innerHTML=html;
}
async function addAssignment(){
  const body={ workerId:$('asgWorker').value, title:$('asgTitle').value.trim(), address:$('asgAddr').value.trim(),
    time:$('asgTime').value, date:$('asgDate').value, notes:$('asgNotes').value.trim(), checklist:$('asgCheck').value };
  if(!body.title){ alert('Give the job a title'); return; }
  await fetch('/api/admin/assignments',{method:'POST',headers:hdr(),body:JSON.stringify(body)});
  schedDate=body.date||schedDate; loadSchedule();
}
async function removeAssignment(id){ if(!confirm('Delete this job?')) return; await fetch('/api/admin/assignments/'+id+'/remove',{method:'POST',headers:hdr(),body:'{}'}); loadSchedule(); }

// ---------- Payroll ----------
async function loadPayroll(){
  const q=payWeek?'?weekStart='+payWeek:'';
  const d=await fetch('/api/admin/payroll'+q,{headers:hdr()}).then(r=>r.json());
  payWeek=d.weekStart;
  let totH=0,totPay=0,totPen=0;
  let rows=d.rows.map(r=>{ totH+=r.netHours; totPay+=(r.pay||0); totPen+=r.penalties;
    return `<tr><td><b>${escapeHtml(r.name)}</b></td><td>${r.rate>0?d.currency+r.rate+'/h':'—'}</td><td>${r.days}</td><td>${r.hours.toFixed(2)}h</td>
      <td style="color:${r.penalties?'var(--red)':'inherit'}">${r.penalties?('-'+r.hoursDocked+'h ('+r.penalties+')'):'—'}</td>
      <td><b>${r.netHours.toFixed(2)}h</b></td><td><b>${r.pay!=null?d.currency+r.pay.toFixed(2):'—'}</b></td></tr>`; }).join('');
  $('tab-payroll').innerHTML=`
    <div class="row" style="margin-bottom:12px">
      <button class="btn ghost small" onclick="shiftWeek(-7)">‹ Prev</button>
      <div style="text-align:center"><b>${d.weekStart}</b> → <b>${d.weekEnd}</b><div class="sub">Pay uses each worker's own rate (set in the Workers tab)</div></div>
      <button class="btn ghost small" onclick="shiftWeek(7)">Next ›</button>
    </div>
    <div class="card" style="padding:6px 12px;overflow-x:auto"><table>
      <tr><th>Worker</th><th>Rate</th><th>Days</th><th>Worked</th><th>Penalty</th><th>Net</th><th>Pay</th></tr>
      ${rows||'<tr><td colspan=7 class="muted">No hours this week.</td></tr>'}
      <tr style="font-weight:800"><td>TOTAL</td><td></td><td></td><td></td><td style="color:var(--red)">${totPen||'—'}</td><td>${totH.toFixed(2)}h</td><td>${d.currency}${totPay.toFixed(2)}</td></tr>
    </table></div>
    <button class="btn brand" onclick="exportPayroll()">⬇ Export as CSV</button>`;
  window._payroll=d;
}
function shiftWeek(days){ const d=new Date(payWeek+'T00:00:00'); d.setDate(d.getDate()+days); payWeek=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; loadPayroll(); }
function exportPayroll(){
  const d=window._payroll; let csv='Worker,Rate,Days,Hours worked,Penalties,Hours docked,Net hours,Pay\n';
  for(const r of d.rows) csv+=`"${r.name}",${r.rate||0},${r.days},${r.hours},${r.penalties},${r.hoursDocked},${r.netHours},${r.pay!=null?r.pay:''}\n`;
  const blob=new Blob([csv],{type:'text/csv'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download=`payroll_${d.weekStart}_to_${d.weekEnd}.csv`; a.click();
}

// ---------- Messages ----------
async function loadMessages(){
  const list=await fetch('/api/admin/announcements',{headers:hdr()}).then(r=>r.json());
  let html=`<div class="card"><h3>📢 Send an announcement</h3>
    <textarea id="annMsg" placeholder="e.g. Team meeting Friday 9am at the depot"></textarea>
    <button class="btn brand" style="margin-top:10px" onclick="sendAnn()">Send to all workers</button></div>`;
  html+=`<h3>Sent messages</h3>`;
  if(!list.length) html+=`<div class="card muted">No messages yet.</div>`;
  for(const a of list){
    html+=`<div class="card"><div class="row"><div>${escapeHtml(a.message)}</div>
      ${a.active?`<button class="btn ghost small" onclick="deactivateAnn(${a.id})">Hide</button>`:'<span class="pill" style="background:var(--card2);color:var(--muted)">hidden</span>'}</div>
      <div class="sub" style="margin-top:8px">${fmtDate(a.at)} ${fmtTime(a.at)} · ✅ read by ${a.reads}/${a.totalWorkers}</div></div>`;
  }
  $('tab-messages').innerHTML=html;
}
async function sendAnn(){ const message=$('annMsg').value.trim(); if(!message) return; await fetch('/api/admin/announcements',{method:'POST',headers:hdr(),body:JSON.stringify({message})}); loadMessages(); }
async function deactivateAnn(id){ await fetch('/api/admin/announcements/'+id+'/deactivate',{method:'POST',headers:hdr(),body:'{}'}); loadMessages(); }

// ---------- Penalties ----------
async function loadPenalties(){
  const rows=await fetch('/api/admin/penalties',{headers:hdr()}).then(r=>r.json());
  const s=settingsCache;
  let html=`<h3>Penalties &nbsp;<span class="muted" style="font-weight:400">tap to waive / restore</span></h3>`;
  if(!rows.length) html+=`<div class="card muted">No penalties yet. 🎉</div>`;
  else{ html+=`<div class="card" style="padding:6px 12px"><table><tr><th>When</th><th>Worker</th><th>Late</th><th>Docked</th><th></th></tr>`;
    for(const p of rows){ const money=s.hourlyRate>0?` (${s.currency}${(p.hours_docked*s.hourlyRate).toFixed(0)})`:'';
      html+=`<tr><td class="${p.waived?'strike':''}">${fmtDate(p.created_at)} ${fmtTime(p.created_at)}</td>
        <td class="${p.waived?'strike':''}">${escapeHtml(p.worker_name)}</td><td class="${p.waived?'strike':''}">${p.minutes_late}m</td>
        <td class="${p.waived?'strike':''}">${p.hours_docked}h${money}</td>
        <td><button class="btn ${p.waived?'ghost':'brand'} small" onclick="waive(${p.id},${p.waived?0:1})">${p.waived?'Restore':'Waive'}</button></td></tr>`; }
    html+=`</table></div>`; }
  $('tab-penalties').innerHTML=html;
}
async function waive(id,waived){ await fetch(`/api/admin/penalties/${id}/waive`,{method:'POST',headers:hdr(),body:JSON.stringify({waived})}); loadPenalties(); }

// ---------- Log ----------
async function loadLog(){
  const rows=await fetch('/api/admin/log',{headers:hdr()}).then(r=>r.json());
  let html=`<h3>Today's activity</h3>`;
  if(!rows.length) html+=`<div class="card muted">Nothing yet today.</div>`;
  else{ html+=`<div class="card" style="padding:6px 12px"><table>`; for(const e of rows) html+=`<tr><td style="width:70px" class="muted">${fmtTime(e.t)}</td><td><b>${escapeHtml(e.name)}</b></td><td>${escapeHtml(e.type)}</td></tr>`; html+=`</table></div>`; }
  $('tab-log').innerHTML=html;
}

// ---------- Workers ----------
async function loadWorkers(){
  const list=await fetch('/api/admin/workers',{headers:hdr()}).then(r=>r.json());
  const cur=(settingsCache&&settingsCache.currency)||'€';
  let html=`<div class="card"><label>Add a worker</label><div class="row"><input id="newWorker" placeholder="Full name"><button class="btn brand" onclick="addWorker()">Add</button></div></div>
    <h3>Your crew &nbsp;<span class="muted" style="font-weight:400">set each person's hourly rate</span></h3>`;
  if(!list.length) html+=`<div class="card muted">No workers yet.</div>`;
  for(const w of list) html+=`<div class="card"><div class="row"><div class="row" style="gap:10px"><span style="width:34px;height:34px;border-radius:50%;background:var(--brand);display:grid;place-items:center;font-weight:700">${initials(w.name)}</span><b>${escapeHtml(w.name)}</b></div>
      <button class="btn ghost small" onclick="removeWorker(${w.id},'${w.name.replace(/'/g,'')}')">Remove</button></div>
      <div class="row" style="margin-top:12px"><label style="margin:0">Hourly rate (${cur})</label>
        <div style="display:flex;gap:6px;align-items:center"><input id="rate_${w.id}" type="number" step="0.5" min="0" value="${w.rate!=null?w.rate:''}" placeholder="0" style="width:90px;text-align:right"><button class="btn brand small" onclick="saveRate(${w.id},event)">Save</button></div></div></div>`;
  $('tab-workers').innerHTML=html;
}
async function saveRate(id,ev){ const rate=$('rate_'+id).value; await fetch('/api/admin/workers/'+id+'/rate',{method:'POST',headers:hdr(),body:JSON.stringify({rate})}); if(ev&&ev.target){ ev.target.textContent='Saved ✓'; setTimeout(()=>{if(ev.target)ev.target.textContent='Save';},1500); } }
async function addWorker(){ const name=$('newWorker').value.trim(); if(!name) return; await fetch('/api/admin/workers',{method:'POST',headers:hdr(),body:JSON.stringify({name})}); loadWorkers(); }
async function removeWorker(id,name){ if(!confirm('Remove '+name+'? Past records are kept.')) return; await fetch(`/api/admin/workers/${id}/remove`,{method:'POST',headers:hdr(),body:'{}'}); loadWorkers(); }

// ---------- Settings ----------
async function loadSettings(){
  const d=await fetch('/api/admin/overview',{headers:hdr()}).then(r=>r.json()); const s=d.settings; settingsCache=s;
  $('tab-settings').innerHTML=`
   <div class="card"><h3>Business & branding</h3>
     <div class="grid2">
       <div><label>Business name</label><input id="setName" value="${escapeHtml(s.businessName||'')}"></div>
       <div><label>Brand colour</label><input id="setColor" type="color" value="${s.brandColor||'#1f7a4d'}" style="height:44px;padding:4px"></div>
     </div></div>
   <div class="card"><h3>Rules</h3>
     <div class="grid2">
       <div><label>Travel window (minutes)</label><input id="setTravel" type="number" value="${s.travelMinutes}"></div>
       <div><label>Penalty (hours docked)</label><input id="setPen" type="number" step="0.5" value="${s.penaltyHours}"></div>
       <div><label>Check-in push every (minutes, 0 = off)</label><input id="setCheckin" type="number" value="${s.checkinMinutes}"></div>
       <div><label>Currency symbol</label><input id="setCur" value="${escapeHtml(s.currency||'')}"></div>
       <div><label>Default hourly rate (fallback if a worker has none)</label><input id="setRate" type="number" step="0.5" value="${s.hourlyRate}"></div>
     </div>
     <label style="display:flex;align-items:center;gap:10px;margin-top:14px"><input type="checkbox" id="setReqPhoto" ${s.requirePhoto?'checked':''} style="width:auto"> Require a photo before finishing a scheduled job</label>
     <label style="display:flex;align-items:center;gap:10px;margin-top:8px"><input type="checkbox" id="setReqCheck" ${s.requireChecklist?'checked':''} style="width:auto"> Require all checklist items ticked before finishing</label>
     <button class="btn brand" style="margin-top:14px" onclick="saveSettings()">Save settings</button><span id="setMsg" class="muted" style="margin-left:10px"></span>
   </div>
   <div class="card"><h3>📅 Premier calendar link</h3>
     <p class="muted" style="margin-top:0">Paste your Premier calendar's <b>Secret address in iCal format</b> (Google Calendar → the calendar's Settings → "Integrate calendar"). Each day's jobs then appear automatically for your cleaners to pick.</p>
     <input id="setCal" placeholder="https://calendar.google.com/calendar/ical/.../basic.ics" value="${escapeHtml(s.calendarIcalUrl||'')}">
     <button class="btn brand" style="margin-top:10px" onclick="saveSettings()">Save calendar link</button>
     <span id="setMsg2" class="muted" style="margin-left:10px"></span>
   </div>
   <div class="card"><h3>Share with your crew</h3>
     <p class="muted" style="margin-top:0">Send this link on WhatsApp — they tap their name, no login:</p>
     <input id="shareUrl" readonly value="${location.origin}">
     <button class="btn ghost" style="margin-top:10px" onclick="navigator.clipboard.writeText($('shareUrl').value)">Copy link</button>
   </div>`;
}
async function saveSettings(){
  const body={ travel_minutes:$('setTravel').value, penalty_hours:$('setPen').value, hourly_rate:$('setRate').value, currency:$('setCur').value,
    checkin_minutes:$('setCheckin')?$('setCheckin').value:undefined,
    business_name:$('setName').value, brand_color:$('setColor').value, require_photo:$('setReqPhoto').checked?1:0, require_checklist:$('setReqCheck').checked?1:0,
    calendar_ical_url:$('setCal')?$('setCal').value.trim():undefined };
  await fetch('/api/admin/settings',{method:'POST',headers:hdr(),body:JSON.stringify(body)});
  $('setMsg').textContent='Saved ✓'; if($('setMsg2'))$('setMsg2').textContent='Saved ✓'; document.documentElement.style.setProperty('--brand', body.brand_color); $('bizName').textContent=body.business_name;
}

if(PIN){ enter(); } else { $('pin').focus(); }
$('pin')?.addEventListener('keydown', e=>{ if(e.key==='Enter') login(); });
</script>
</body>
</html>
