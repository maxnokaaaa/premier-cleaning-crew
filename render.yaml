# Deploy config for Render (https://render.com). Free plan — no card required.
services:
  - type: web
    name: premier-cleaning-crew
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: ADMIN_PIN
        sync: false          # Render asks you to type your own secret owner PIN
      - key: TZ
        value: Europe/Malta
